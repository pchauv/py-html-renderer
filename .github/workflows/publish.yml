name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5.0.0

      - name: Build package
        run: uv build

      - name: Publish to GitHub Packages
        run: |
          uv publish \
            --publish-url https://pypi.pkg.github.com/${{ github.repository }} \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}